<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 키워드 모니터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.09);
    --accent: #b5862a;
    --accent2: #3b5fe2;
    --accent3: #d94f4f;
    --text: #1a1a22;
    --text-dim: #5a5a70;
    --text-muted: #a0a0b0;
    --tag-colors: #3b5fe2, #3a9e60, #d97c2a, #8c4fd6, #1a9e8c, #c44f7c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-group h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .logo-group h1 span {
    color: var(--accent);
  }

  .logo-group p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  .header-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    line-height: 1.6;
  }

  .header-meta .date {
    color: var(--accent);
    font-size: 13px;
  }

  /* Main layout */
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    min-height: calc(100vh - 120px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 28px 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 120px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }

  .sidebar-section {
    padding: 0 24px;
  }

  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* Keyword input */
  .keyword-input-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .keyword-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .keyword-input:focus {
    border-color: var(--accent2);
  }

  .keyword-input::placeholder { color: var(--text-muted); }

  .btn-add {
    background: var(--accent);
    color: #ffffff;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    font-weight: 300;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .btn-add:hover { opacity: 0.85; transform: scale(1.05); }

  /* Keyword list */
  .keyword-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 28px;
  }

  .keyword-tag {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    gap: 8px;
  }

  .keyword-tag.active {
    border-color: var(--accent2);
    background: rgba(124, 156, 255, 0.06);
  }

  .keyword-tag:hover:not(.active) {
    border-color: rgba(255,255,255,0.15);
  }

  .keyword-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .keyword-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .keyword-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    padding: 2px 7px;
    border-radius: 20px;
  }

  .keyword-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.2s;
  }

  .keyword-del:hover { color: var(--accent3); }

  /* Search button */
  .btn-search {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, rgba(181,134,42,0.1), rgba(59,95,226,0.08));
    border: 1px solid rgba(181,134,42,0.35);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.02em;
  }

  .btn-search:hover {
    background: linear-gradient(135deg, rgba(181,134,42,0.18), rgba(59,95,226,0.14));
    border-color: rgba(181,134,42,0.55);
  }

  .btn-search:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(181,134,42,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Content area */
  .content {
    padding: 28px 32px;
    overflow-y: auto;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    text-align: center;
    gap: 16px;
    animation: fadeIn 0.5s ease;
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
    filter: grayscale(1);
  }

  .empty-state h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .empty-state p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 320px;
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .results-header h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .keyword-badge {
    padding: 3px 12px;
    border-radius: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid;
  }

  .results-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab.active {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .tab .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Summary card */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: var(--card-color, var(--accent2));
    opacity: 0.6;
  }

  .summary-card h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .summary-card h3 .kw-tag {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    color: #ffffff;
  }

  .summary-text {
    font-size: 13.5px;
    line-height: 1.85;
    color: rgba(232,232,240,0.82);
    margin-bottom: 18px;
  }

  /* Article links */
  .article-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .article-link {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  .article-link:hover {
    border-color: rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
  }

  .article-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
    flex-shrink: 0;
    width: 18px;
  }

  .article-info {
    flex: 1;
    min-width: 0;
  }

  .article-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .article-source {
    color: var(--text-dim);
    font-weight: 500;
  }

  .article-ext {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--accent2);
    opacity: 0.7;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
  }

  .article-ext:hover { opacity: 1; }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 50vh;
    gap: 20px;
    animation: fadeIn 0.3s ease;
  }

  .loading-bars {
    display: flex;
    gap: 5px;
    align-items: flex-end;
    height: 36px;
  }

  .bar {
    width: 5px;
    background: var(--accent2);
    animation: barAnim 1s ease-in-out infinite;
  }

  .bar:nth-child(1) { animation-delay: 0s; height: 20px; }
  .bar:nth-child(2) { animation-delay: 0.1s; height: 28px; }
  .bar:nth-child(3) { animation-delay: 0.2s; height: 36px; }
  .bar:nth-child(4) { animation-delay: 0.3s; height: 28px; }
  .bar:nth-child(5) { animation-delay: 0.4s; height: 20px; }

  @keyframes barAnim {
    0%, 100% { transform: scaleY(0.5); opacity: 0.3; }
    50% { transform: scaleY(1); opacity: 0.9; }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

  /* Error */
  .error-box {
    padding: 16px 18px;
    background: rgba(255, 124, 124, 0.06);
    border: 1px solid rgba(255, 124, 124, 0.2);
    border-radius: 10px;
    font-size: 13px;
    color: var(--accent3);
    margin-bottom: 20px;
  }

  .all-tab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-group">
      <h1>뉴스 키워드 <span>모니터</span></h1>
      <p>// AI-powered news keyword tracker</p>
    </div>
    <div class="header-meta">
      <div class="date" id="dateDisplay"></div>
      <div>전일자 인터넷 뉴스 기준</div>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">키워드 추가</div>
        <div class="keyword-input-wrap">
          <input class="keyword-input" id="keywordInput" type="text" placeholder="키워드 입력..." maxlength="20" />
          <button class="btn-add" id="btnAdd" title="추가">+</button>
        </div>

        <div class="sidebar-label">저장된 키워드</div>
        <div class="keyword-list" id="keywordList">
          <!-- populated by JS -->
        </div>

        <button class="btn-search" id="btnSearch">
          <span id="searchBtnContent">🔍 뉴스 검색 및 요약</span>
        </button>
      </div>
    </aside>

    <!-- Content -->
    <section class="content" id="content">
      <!-- populated by JS -->
    </section>
  </main>
</div>

<script>
// ── State ──────────────────────────────────────────────
const COLORS = ['#7c9cff','#a8d8a0','#ffb87c','#c87cff','#7cffe8','#ff9eb5','#ffe07c','#ff9e7c'];

let state = {
  keywords: JSON.parse(localStorage.getItem('nwm_keywords') || '[]'),
  results: JSON.parse(localStorage.getItem('nwm_results') || 'null'),
  activeKeyword: 'all',
  loading: false,
  errorMsg: null,
};

if (state.keywords.length === 0) {
  // 기본 예시 키워드
  state.keywords = [
    { id: 1, text: '인공지능', color: COLORS[0] },
    { id: 2, text: '반도체', color: COLORS[1] },
  ];
  saveKeywords();
}

function saveKeywords() {
  localStorage.setItem('nwm_keywords', JSON.stringify(state.keywords));
}

function saveResults() {
  localStorage.setItem('nwm_results', JSON.stringify(state.results));
}

// ── Date ──────────────────────────────────────────────
function formatDate() {
  const now = new Date();
  const yesterday = new Date(now);
  yesterday.setDate(now.getDate() - 1);
  const yy = yesterday.getFullYear();
  const mm = String(yesterday.getMonth()+1).padStart(2,'0');
  const dd = String(yesterday.getDate()).padStart(2,'0');
  document.getElementById('dateDisplay').textContent = `${yy}.${mm}.${dd}`;
  return `${yy}년 ${mm}월 ${dd}일`;
}

const targetDate = formatDate();

// ── Render sidebar ────────────────────────────────────
function renderKeywords() {
  const list = document.getElementById('keywordList');
  if (state.keywords.length === 0) {
    list.innerHTML = `<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">키워드를 추가해주세요</div>`;
    return;
  }
  list.innerHTML = state.keywords.map((kw, i) => {
    const count = getArticleCount(kw.text);
    const isActive = state.activeKeyword === kw.text;
    return `
      <div class="keyword-tag ${isActive ? 'active' : ''}" data-id="${kw.id}" onclick="selectKeyword('${kw.text}')">
        <span class="keyword-dot" style="background:${kw.color}"></span>
        <span class="keyword-name">${kw.text}</span>
        ${count > 0 ? `<span class="keyword-count">${count}</span>` : ''}
        <button class="keyword-del" onclick="deleteKeyword(event, ${kw.id})" title="삭제">×</button>
      </div>`;
  }).join('');
}

function getArticleCount(keyword) {
  if (!state.results) return 0;
  const r = state.results.find(r => r.keyword === keyword);
  return r ? (r.articles || []).length : 0;
}

// ── Keyword management ────────────────────────────────
function addKeyword() {
  const input = document.getElementById('keywordInput');
  const text = input.value.trim();
  if (!text) return;
  if (state.keywords.find(k => k.text === text)) {
    input.style.borderColor = 'var(--accent3)';
    setTimeout(() => input.style.borderColor = '', 1000);
    return;
  }
  const color = COLORS[state.keywords.length % COLORS.length];
  state.keywords.push({ id: Date.now(), text, color });
  saveKeywords();
  input.value = '';
  renderKeywords();
}

function deleteKeyword(e, id) {
  e.stopPropagation();
  state.keywords = state.keywords.filter(k => k.id !== id);
  saveKeywords();
  if (state.results) {
    const kw = state.keywords.find(k => k.id === id);
    if (kw && state.results) {
      state.results = state.results.filter(r => r.keyword !== kw.text);
      saveResults();
    }
  }
  renderKeywords();
  renderContent();
}

function selectKeyword(text) {
  state.activeKeyword = state.activeKeyword === text ? 'all' : text;
  renderKeywords();
  renderContent();
}

// ── Search & Summarize ────────────────────────────────
async function searchAndSummarize() {
  if (state.keywords.length === 0) {
    alert('키워드를 먼저 추가해주세요.');
    return;
  }

  state.loading = true;
  state.errorMsg = null;
  state.results = null;
  renderSearchBtn();
  renderContent();

  try {
    const results = [];

    for (const kw of state.keywords) {
      const result = await fetchKeywordNews(kw.text, kw.color);
      results.push(result);
      // 각 키워드 완료될 때마다 중간 저장
      state.results = results;
      renderContent();
    }

    state.results = results;
    saveResults();
  } catch(err) {
    console.error(err);
    state.errorMsg = err.message || '알 수 없는 오류가 발생했습니다.';
    renderContent();
  } finally {
    state.loading = false;
    renderSearchBtn();
    renderContent();
  }
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzQ0nckqvvgf4cd8uavElbSFkMj6fFe-IemLCUNVldb58wvvNiH8TAE4Hc-NdIvYZ0hTQ/exec';

async function fetchKeywordNews(keyword, color) {
  const url = `${GAS_URL}?keyword=${encodeURIComponent(keyword)}&display=7`;
  const response = await fetch(url);

  if (!response.ok) {
    throw new Error(`네이버 API 오류 ${response.status}: ${response.statusText}`);
  }

  const data = await response.json();

  if (data.error) {
    throw new Error(`네이버 API 오류: ${data.error}`);
  }

  const items = data.items || [];

  // HTML 태그 제거 함수
  function stripHtml(str) {
    return str ? str.replace(/<[^>]*>/g, '').replace(/&quot;/g, '"').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&#039;/g, "'") : '';
  }

  const articles = items.map(item => ({
    title: stripHtml(item.title),
    source: item.originallink ? new URL(item.originallink).hostname.replace('www.', '') : '네이버뉴스',
    url: item.originallink || item.link,
    description: stripHtml(item.description)
  }));

  // 요약: 상위 3개 제목 기반으로 간단히 구성
  const summary = articles.length > 0
    ? `"${keyword}" 관련 최신 뉴스 ${articles.length}건이 검색되었습니다. 주요 기사: ${articles.slice(0,2).map(a => a.title).join(' / ')}`
    : `"${keyword}" 관련 최신 뉴스를 찾을 수 없습니다.`;

  return {
    keyword,
    color,
    summary,
    articles,
    fetchedAt: new Date().toISOString()
  };
}

// ── Render content ────────────────────────────────────
function renderContent() {
  const el = document.getElementById('content');

  if (state.loading && !state.results) {
    el.innerHTML = `
      <div class="loading-state">
        <div class="loading-bars">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div>
        </div>
        <div class="loading-text">뉴스를 검색하고 있습니다...</div>
      </div>`;
    return;
  }

  if (state.errorMsg && (!state.results || state.results.length === 0)) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h2>오류가 발생했습니다</h2>
        <p style="color:var(--accent3)">${state.errorMsg}</p>
        <p style="margin-top:8px">잠시 후 다시 시도해주세요.</p>
      </div>`;
    return;
  }

  if (!state.results || state.results.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📰</div>
        <h2>뉴스를 검색해보세요</h2>
        <p>키워드를 추가하고 <strong style="color:var(--accent)">뉴스 검색 및 요약</strong> 버튼을 누르면 전일자 뉴스를 키워드별로 요약해드립니다.</p>
      </div>`;
    return;
  }

  const activeKw = state.keywords.find(k => k.text === state.activeKeyword);
  const displayResults = state.activeKeyword === 'all'
    ? state.results
    : state.results.filter(r => r.keyword === state.activeKeyword);

  const totalCount = state.results.reduce((s, r) => s + (r.articles||[]).length, 0);
  const fetchTime = state.results[0]?.fetchedAt
    ? new Date(state.results[0].fetchedAt).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})
    : '';

  // Tab bar
  const tabs = [
    `<button class="tab ${state.activeKeyword === 'all' ? 'active' : ''}" onclick="selectKeyword('all')">
      전체 <span style="font-family:JetBrains Mono;font-size:10px;opacity:0.6">${totalCount}</span>
    </button>`
  ];
  state.results.forEach(r => {
    const kw = state.keywords.find(k => k.text === r.keyword);
    const color = kw ? kw.color : '#7c9cff';
    tabs.push(`
      <button class="tab ${state.activeKeyword === r.keyword ? 'active' : ''}" onclick="selectKeyword('${r.keyword}')">
        <span class="dot" style="background:${color}"></span>
        ${r.keyword}
        <span style="font-family:JetBrains Mono;font-size:10px;opacity:0.6">${(r.articles||[]).length}</span>
      </button>`);
  });

  // Cards
  const cards = displayResults.map((r, idx) => {
    const kw = state.keywords.find(k => k.text === r.keyword);
    const color = kw ? kw.color : COLORS[idx % COLORS.length];

    const articlesHtml = (r.articles || []).map((a, i) => `
      <a class="article-link" href="${a.url || '#'}" target="${a.url ? '_blank' : '_self'}" rel="noopener">
        <span class="article-num">0${i+1}</span>
        <div class="article-info">
          <div class="article-title">${a.title}</div>
          <div class="article-meta">
            <span class="article-source">${a.source}</span>
            <span>·</span>
            <span>${a.description || ''}</span>
          </div>
        </div>
        ${a.url ? `<a class="article-ext" href="${a.url}" target="_blank" rel="noopener" onclick="e=>e.stopPropagation()">↗</a>` : ''}
      </a>`).join('');

    return `
      <div class="summary-card" style="--card-color: ${color}; animation-delay: ${idx * 0.08}s">
        <h3>
          <span class="kw-tag" style="background:${color}">${r.keyword}</span>
          키워드 뉴스 요약
        </h3>
        <p class="summary-text">${r.summary}</p>
        <div class="article-list">${articlesHtml}</div>
      </div>`;
  }).join('');

  const isLoadingMore = state.loading && state.results && state.results.length < state.keywords.length;

  el.innerHTML = `
    <div class="results-header">
      <h2>
        ${state.activeKeyword === 'all' ? '전체 키워드' : `<span class="keyword-badge" style="color:${activeKw?.color||'var(--accent2)'};border-color:${activeKw?.color||'var(--accent2)'}33">${state.activeKeyword}</span>`}
        뉴스 브리핑
      </h2>
      <div class="results-meta">${targetDate} · ${fetchTime ? `${fetchTime} 수집` : ''}</div>
    </div>
    <div class="tab-bar">${tabs.join('')}</div>
    ${isLoadingMore ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px;font-family:JetBrains Mono">⟳ 나머지 키워드 검색 중...</div>` : ''}
    <div class="${state.activeKeyword === 'all' ? 'all-tab-grid' : ''}">${cards}</div>`;
}

function renderSearchBtn() {
  const btn = document.getElementById('btnSearch');
  const inner = document.getElementById('searchBtnContent');
  btn.disabled = state.loading;
  inner.innerHTML = state.loading
    ? `<span class="spinner"></span> 검색 중...`
    : `🔍 뉴스 검색 및 요약`;
}

// ── Event listeners ───────────────────────────────────
document.getElementById('btnAdd').addEventListener('click', addKeyword);
document.getElementById('keywordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addKeyword();
});
document.getElementById('btnSearch').addEventListener('click', searchAndSummarize);

// ── Init ──────────────────────────────────────────────
renderKeywords();
renderContent();
</script>

</body>
</html>
